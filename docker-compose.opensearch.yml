version: "3.8"

services:
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: footprintshub-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=LocalDevPassword123!
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - footprintshub-opensearch-data:/usr/share/opensearch/data

volumes:
  footprintshub-opensearch-data:

